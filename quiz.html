<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CapiMenú — Quiz 🦫</title>
<meta name="theme-color" content="#6f9440">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #f6f7ee; --card: #ffffff; --ink: #33301f; --muted: #8b8570;
    --accent: #6f9440; --accent-soft: #eaf1dc; --line: #e8e6d8;
    --shadow: 0 1px 4px rgba(51,48,31,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink); padding-bottom: 40px;
  }
  header { padding: 18px 20px 6px; display: flex; align-items: center; gap: 10px; }
  header img { width: 40px; height: 40px; }
  header h1 { font-size: 1.25rem; letter-spacing: -.02em; }
  main { padding: 6px 16px 24px; max-width: 560px; margin: 0 auto; }
  .card {
    background: var(--card); border-radius: 16px; box-shadow: var(--shadow);
    padding: 14px 16px; margin-bottom: 12px; border: 1px solid var(--line);
  }
  .card h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
  .card p, label.q { font-size: .9rem; line-height: 1.5; }
  .intro { font-size: .9rem; line-height: 1.55; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; font-size: .8rem; color: var(--muted); margin-top: 8px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: 5px; }
  .field input[type=text], .field input[type=number], .field select, .field textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
    font-size: .95rem; background: var(--bg); color: var(--ink); font-family: inherit;
  }
  .field textarea { min-height: 64px; resize: vertical; }
  .field .hint { font-size: .74rem; color: var(--muted); margin-top: 4px; }
  .row2 { display: flex; gap: 10px; }
  .row2 .field { flex: 1; }

  .chk { display: flex; align-items: center; gap: 10px; padding: 8px 2px; font-size: .92rem; cursor: pointer; }
  .chk input { width: 20px; height: 20px; accent-color: var(--accent); flex-shrink: 0; }

  .food-head { display: flex; align-items: center; padding: 4px 2px 8px; font-size: .72rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
  .food-head .who { width: 52px; text-align: center; flex-shrink: 0; }
  .food { display: flex; align-items: center; gap: 8px; padding: 7px 2px; border-bottom: 1px solid var(--line); }
  .food:last-child { border-bottom: none; }
  .food .name { flex: 1; font-size: .92rem; min-width: 0; }
  .rate {
    width: 52px; height: 38px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--bg); font-size: 1.05rem; cursor: pointer; flex-shrink: 0; color: var(--muted);
  }
  .rate.set { background: var(--accent-soft); border-color: var(--accent); }

  .btn {
    display: block; border: none; border-radius: 12px; padding: 14px 16px;
    font-size: .95rem; font-weight: 700; cursor: pointer; width: 100%;
    background: var(--accent); color: #fff; margin-top: 4px; text-align: center;
  }
  .note { font-size: .8rem; color: var(--muted); text-align: center; margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
<header><img src="icon.svg" alt=""><h1>Quiz CapiMenú 🦫</h1></header>
<main id="main"></main>
<script>
"use strict";
/* Quiz de onboarding — se responde una vez, se comparte por WhatsApp.
   Respuestas se guardan en localStorage mientras contesta (puede pausar). */

const QK = "capimenu_quiz_v1";
function load() { try { return JSON.parse(localStorage.getItem(QK)) || {}; } catch { return {}; } }
const A = load();
A.r = A.r || {};   // ratings: { "prot.Pollo.e": "❤️" }
A.f = A.f || {};   // fields:  { edad: "34", ... }
A.c = A.c || {};   // checks:  { "equipo.Horno": true }
function save() { localStorage.setItem(QK, JSON.stringify(A)); }

const RATINGS = ["❤️", "👍", "🥸", "❌"];

const FOODS = [
  { id: "prot", title: "Proteínas 💪", items: ["Pollo", "Carne molida", "Bistec de vacuno", "Cerdo", "Huevo", "Atún en lata", "Jurel en lata", "Pescado fresco (merluza, reineta)", "Camarones", "Lentejas", "Porotos", "Garbanzos", "Yogur natural / griego", "Quesillo / queso fresco", "Jamón de pavo"] },
  { id: "verd", title: "Verduras 🥕", items: ["Tomate", "Lechuga", "Zanahoria", "Espinaca", "Acelga", "Champiñones", "Palta", "Zapallo", "Zapallito italiano", "Choclo", "Porotos verdes", "Betarraga", "Brócoli", "Coliflor", "Cebolla", "Pimentón"] },
  { id: "carb", title: "Carbohidratos 🍚", items: ["Arroz", "Fideos / pasta", "Papas", "Camote", "Marraqueta / hallulla", "Pan integral", "Avena", "Quinoa", "Tortillas / fajitas"] },
  { id: "frut", title: "Frutas 🍎", items: ["Manzana", "Plátano", "Naranja / mandarina", "Pera", "Uvas", "Frutillas", "Kiwi", "Durazno", "Melón / sandía", "Piña"] },
  { id: "sabor", title: "Sabores y estilos 🧂", items: ["Ají / picante", "Merkén", "Cilantro", "Ajo", "Limón", "Salsa de soya", "Mostaza", "Mayonesa", "Comida italiana", "Comida asiática", "Comida chilena casera"] },
];

const SHOPS = ["Feria libre", "Líder", "Jumbo", "Santa Isabel", "Unimarc", "Almacén del barrio"];
const EQUIP = ["Horno", "Licuadora", "Microondas", "Olla a presión", "Freidora de aire", "Espacio en congelador"];

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function field(id, label, type, hint, placeholder) {
  const v = A.f[id] || "";
  const inp = type === "textarea"
    ? `<textarea data-f="${id}" placeholder="${esc(placeholder || "")}">${esc(v)}</textarea>`
    : `<input type="${type}" data-f="${id}" value="${esc(v)}" placeholder="${esc(placeholder || "")}">`;
  return `<div class="field"><label>${label}</label>${inp}${hint ? `<div class="hint">${hint}</div>` : ""}</div>`;
}
function selectField(id, label, opts) {
  const v = A.f[id] || "";
  return `<div class="field"><label>${label}</label>
    <select data-f="${id}">
      <option value=""${v === "" ? " selected" : ""}>elige…</option>
      ${opts.map(o => `<option${v === o ? " selected" : ""}>${esc(o)}</option>`).join("")}
    </select></div>`;
}
function checks(group, items) {
  return items.map(it => {
    const k = `${group}.${it}`;
    return `<label class="chk"><input type="checkbox" data-c="${esc(k)}"${A.c[k] ? " checked" : ""}>${esc(it)}</label>`;
  }).join("");
}
function foodCard(cat) {
  const rows = cat.items.map(it => {
    const kE = `${cat.id}.${it}.e`, kH = `${cat.id}.${it}.h`;
    return `<div class="food"><span class="name">${esc(it)}</span>
      <button class="rate ${A.r[kE] ? "set" : ""}" data-r="${esc(kE)}">${A.r[kE] || "·"}</button>
      <button class="rate ${A.r[kH] ? "set" : ""}" data-r="${esc(kH)}">${A.r[kH] || "·"}</button>
    </div>`;
  }).join("");
  return `<div class="card"><h2>${cat.title}</h2>
    <div class="food-head"><span style="flex:1"></span><span class="who">Tú</span><span class="who">Hijo</span></div>
    ${rows}</div>`;
}

document.getElementById("main").innerHTML = `
  <div class="card"><p class="intro">Este quiz arma tu primer menú semanal: comidas
  que sí van a querer comer, con lo que hay en la feria y sin recetas eternas.
  Son ~5 minutos; puedes pausar y seguir después (se guarda solo).</p>
  <div class="legend"><span>❤️ me encanta</span><span>👍 bien</span>
  <span>🥸 solo escondido/mezclado</span><span>❌ no</span><span>· = sin responder (ok si no sabes)</span></div></div>

  <div class="card"><h2>Sobre ti</h2>
    <div class="row2">${field("edad", "Edad", "number")}${field("estatura", "Estatura (cm)", "number")}</div>
    <div class="row2">${field("peso", "Peso (kg)", "number", "aproximado sirve")}${""}</div>
    ${selectField("actividad", "Actividad física", ["Sedentaria (casi nada)", "Ligera (camino algo)", "Moderada (ejercicio 2–3×/sem)", "Alta (ejercicio 4+×/sem)"])}
    ${selectField("objetivo", "Objetivo principal", ["Bajar de peso", "Comer mejor / más orden", "Más energía", "Ahorrar en comida"])}
    ${field("salud", "¿Condiciones médicas o medicamentos?", "textarea", "Si hay algo aquí, el número de un médico manda sobre cualquier cálculo nuestro.", "diabetes, tiroides, anticonceptivos, nada…")}
    ${field("alergias", "Alergias o intolerancias (tuyas)", "textarea", "", "lactosa, mariscos, ninguna…")}
  </div>

  <div class="card"><h2>Sobre tu hijo</h2>
    ${field("hijoEdad", "Edad", "number")}
    ${selectField("hijoAlmuerzo", "¿Almuerza en el colegio?", ["Sí, la mayoría de los días", "A veces", "No, almuerza en casa"])}
    ${field("hijoAlergias", "Alergias o intolerancias (de él)", "textarea", "", "ninguna…")}
    <p style="font-size:.8rem;color:var(--muted)">Él come lo mismo que tú en porción de niño —
    el menú nunca le pone metas ni restricciones a él. 🦫</p>
  </div>

  ${FOODS.map(foodCard).join("")}

  <div class="card"><h2>Favoritos y vetos</h2>
    ${field("favTu", "Tus 3 comidas favoritas de la vida", "textarea", "", "pastel de choclo, sushi…")}
    ${field("favHijo", "Las 3 favoritas de tu hijo", "textarea", "", "fideos con salsa, completos…")}
    ${field("vetos", "Comidas que NO quieren ver en el menú", "textarea", "", "guatitas, pescado con espinas…")}
  </div>

  <div class="card"><h2>Cocina</h2>
    ${selectField("tiempo", "Tiempo real para cocinar entre semana", ["≤20 min", "≤30 min", "≤45 min", "Depende del día"])}
    <div class="field"><label>Equipo disponible</label>${checks("equipo", EQUIP)}</div>
  </div>

  <div class="card"><h2>Compras</h2>
    <div class="field"><label>¿Dónde compras normalmente?</label>${checks("compra", SHOPS)}</div>
    ${selectField("frecuencia", "¿Cada cuánto compras?", ["Semanal", "Quincenal", "Cuando se acaba"])}
    ${field("presupuesto", "Presupuesto semanal aprox. de comida (CLP)", "number", "Opcional — ayuda a calibrar el menú. No se muestra en la app.")}
  </div>

  <button class="btn" id="share">📤 Compartir mis respuestas</button>
  <p class="note">Se abre WhatsApp con tus respuestas listas para enviar.<br>
  Nada sale de tu teléfono hasta que tú lo mandes.</p>`;

/* ---------- events ---------- */
document.getElementById("main").addEventListener("click", e => {
  const r = e.target.closest("[data-r]");
  if (r) {
    const k = r.dataset.r;
    const cur = RATINGS.indexOf(A.r[k]);
    const next = RATINGS[cur + 1]; // undefined después de ❌ → vuelve a "sin responder"
    if (next) A.r[k] = next; else delete A.r[k];
    r.textContent = A.r[k] || "·";
    r.classList.toggle("set", !!A.r[k]);
    save(); return;
  }
  if (e.target.id === "share") shareAnswers(e.target);
});
document.getElementById("main").addEventListener("input", e => {
  if (e.target.dataset.f !== undefined) { A.f[e.target.dataset.f] = e.target.value; save(); }
});
document.getElementById("main").addEventListener("change", e => {
  if (e.target.dataset.c !== undefined) { A.c[e.target.dataset.c] = e.target.checked; save(); }
});

/* ---------- share ---------- */
function ratingLines(cat, who) {
  const by = {};
  for (const it of cat.items) {
    const v = A.r[`${cat.id}.${it}.${who}`];
    if (v) (by[v] = by[v] || []).push(it);
  }
  return RATINGS.filter(v => by[v]).map(v => `  ${v} ${by[v].join(", ")}`).join("\n");
}
function shareAnswers(btn) {
  const f = id => A.f[id] || "—";
  const cks = g => Object.keys(A.c).filter(k => k.startsWith(g + ".") && A.c[k]).map(k => k.slice(g.length + 1)).join(", ") || "—";
  let out = `Quiz CapiMenú 🦫\n\nSOBRE MÍ\nEdad: ${f("edad")} · Estatura: ${f("estatura")} cm · Peso: ${f("peso")} kg\nActividad: ${f("actividad")}\nObjetivo: ${f("objetivo")}\nSalud/medicamentos: ${f("salud")}\nAlergias: ${f("alergias")}\n\nMI HIJO\nEdad: ${f("hijoEdad")} · Almuerzo colegio: ${f("hijoAlmuerzo")}\nAlergias: ${f("hijoAlergias")}\n`;
  for (const cat of FOODS) {
    out += `\n${cat.title.toUpperCase()}\nYo:\n${ratingLines(cat, "e") || "  (sin responder)"}\nHijo:\n${ratingLines(cat, "h") || "  (sin responder)"}\n`;
  }
  out += `\nFAVORITOS\nMíos: ${f("favTu")}\nDe él: ${f("favHijo")}\nVetos: ${f("vetos")}\n\nCOCINA\nTiempo entre semana: ${f("tiempo")}\nEquipo: ${cks("equipo")}\n\nCOMPRAS\nDónde: ${cks("compra")}\nFrecuencia: ${f("frecuencia")}\nPresupuesto semanal: ${A.f.presupuesto ? "$" + Number(A.f.presupuesto).toLocaleString("es-CL") + " CLP" : "—"}\n`;
  if (navigator.share) {
    navigator.share({ text: out }).catch(() => {});
  } else {
    navigator.clipboard.writeText(out).then(() => {
      btn.textContent = "✅ Copiado — pégalo en WhatsApp";
      setTimeout(() => { btn.textContent = "📤 Compartir mis respuestas"; }, 2500);
    });
  }
}
</script>
</body>
</html>
