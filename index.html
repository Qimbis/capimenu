<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CapiMenú 🦫</title>
<meta name="theme-color" content="#6f9440">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root {
    --bg: #f6f7ee; --card: #ffffff; --ink: #33301f; --muted: #8b8570;
    --accent: #6f9440; --accent-soft: #eaf1dc; --green: #4a8c5c;
    --green-soft: #e5f2e9; --line: #e8e6d8; --shadow: 0 1px 4px rgba(51,48,31,.08);
    --capi: #a9793f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink);
    padding-bottom: calc(70px + env(safe-area-inset-bottom));
  }
  header {
    padding: 18px 20px 10px; display: flex; align-items: center; gap: 10px;
  }
  header img { width: 40px; height: 40px; }
  header h1 { font-size: 1.35rem; letter-spacing: -.02em; }
  header .week-label { margin-left: auto; text-align: right; font-size: .75rem; color: var(--muted); line-height: 1.35; }
  main { padding: 6px 16px 24px; max-width: 560px; margin: 0 auto; }

  .card {
    background: var(--card); border-radius: 16px; box-shadow: var(--shadow);
    padding: 14px 16px; margin-bottom: 12px; border: 1px solid var(--line);
  }
  .card h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
  .card p { font-size: .9rem; line-height: 1.55; }

  .meal {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--line); cursor: pointer;
  }
  .meal:last-child { border-bottom: none; }
  .meal .emoji { font-size: 1.5rem; width: 36px; text-align: center; flex-shrink: 0; }
  .meal .info { flex: 1; min-width: 0; }
  .meal .slot { font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .meal .title { font-size: .95rem; font-weight: 600; }
  .meal.done .title { text-decoration: line-through; color: var(--muted); }
  .check {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--line);
    background: none; flex-shrink: 0; font-size: .95rem; color: transparent; cursor: pointer;
  }
  .meal.done .check { background: var(--green); border-color: var(--green); color: #fff; }

  .day-block { margin-bottom: 4px; }
  .day-name { font-weight: 700; font-size: .9rem; margin: 14px 4px 6px; }
  .day-name.today { color: var(--accent); }
  .day-name.today::after { content: " · hoy"; font-weight: 600; font-size: .75rem; }
  .mini-meal { display: flex; gap: 8px; padding: 6px 4px; font-size: .88rem; align-items: baseline; cursor: pointer; }
  .mini-meal .slot { color: var(--muted); font-size: .7rem; width: 74px; flex-shrink: 0; text-transform: uppercase; letter-spacing: .04em; }

  .snack-note, .prep-list li, .rules li { font-size: .85rem; color: var(--ink); line-height: 1.5; }
  .prep-list, .rules { padding-left: 20px; }
  .prep-list li, .rules li { margin-bottom: 6px; }

  .shop-cat { font-weight: 700; font-size: .9rem; margin: 16px 4px 6px; }
  .shop-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .shop-item:last-child { border-bottom: none; }
  .shop-item label { flex: 1; font-size: .92rem; display: flex; align-items: center; gap: 10px; cursor: pointer; min-width: 0; }
  .shop-item .qty { color: var(--muted); font-size: .8rem; white-space: nowrap; }
  .shop-item.done .name { text-decoration: line-through; color: var(--muted); }
  .shop-item input { width: 20px; height: 20px; accent-color: var(--green); flex-shrink: 0; }
  .store-link {
    text-decoration: none; font-size: .72rem; background: #0071dc22; color: #0a4f94;
    padding: 4px 8px; border-radius: 999px; white-space: nowrap; font-weight: 600;
  }
  .btn {
    display: inline-block; border: none; border-radius: 12px; padding: 12px 16px;
    font-size: .9rem; font-weight: 700; cursor: pointer; width: 100%;
    background: var(--accent); color: #fff; margin-top: 4px; text-align: center;
    text-decoration: none;
  }
  .btn.secondary { background: var(--accent-soft); color: var(--accent); }

  .antojo-form { display: flex; gap: 8px; margin-bottom: 12px; }
  .antojo-form input {
    flex: 1; border: 1px solid var(--line); border-radius: 12px; padding: 12px;
    font-size: .95rem; background: var(--card); color: var(--ink);
  }
  .antojo-form button { width: 52px; border: none; border-radius: 12px; background: var(--accent); color: #fff; font-size: 1.3rem; cursor: pointer; }
  .antojo { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .antojo:last-child { border-bottom: none; }
  .antojo .txt { flex: 1; font-size: .95rem; }
  .antojo .date { font-size: .7rem; color: var(--muted); }
  .antojo .del { border: none; background: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; padding: 4px 8px; }
  .empty { text-align: center; color: var(--muted); font-size: .88rem; padding: 20px 0; }

  nav {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: var(--card); border-top: 1px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav button {
    flex: 1; border: none; background: none; padding: 9px 0 7px; cursor: pointer;
    font-size: .68rem; color: var(--muted); font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  nav button .ico { font-size: 1.35rem; }
  nav button.active { color: var(--accent); }

  /* Recipe modal (bottom sheet) */
  #modal {
    position: fixed; inset: 0; background: rgba(51,48,31,.45); display: none;
    align-items: flex-end; z-index: 50;
  }
  #modal.open { display: flex; }
  .sheet {
    background: var(--bg); width: 100%; max-width: 560px; margin: 0 auto;
    border-radius: 20px 20px 0 0; max-height: 86vh; overflow-y: auto;
    padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
  }
  .sheet .handle { width: 44px; height: 4px; background: var(--line); border-radius: 2px; margin: 0 auto 14px; }
  .sheet h3 { font-size: 1.15rem; margin-bottom: 2px; }
  .sheet .time { color: var(--muted); font-size: .8rem; margin-bottom: 14px; }
  .sheet h4 { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 16px 0 8px; }
  .ing { display: flex; justify-content: space-between; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--line); font-size: .9rem; }
  .ing .amt { color: var(--muted); text-align: right; white-space: nowrap; font-size: .82rem; line-height: 1.4; }
  .ing .amt b { color: var(--accent); font-weight: 700; }
  .steps { padding-left: 20px; }
  .steps li { font-size: .9rem; line-height: 1.55; margin-bottom: 8px; }
  details.nutri { margin-top: 16px; border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; background: var(--card); }
  details.nutri summary { font-size: .82rem; color: var(--muted); cursor: pointer; font-weight: 600; }
  details.nutri p { font-size: .85rem; margin-top: 8px; }

  .onboard-hero { text-align: center; padding: 26px 10px 10px; }
  .onboard-hero img { width: 96px; height: 96px; }
  .onboard-hero h2 { font-size: 1.2rem; margin-top: 10px; text-transform: none; letter-spacing: 0; color: var(--ink); }
  .ios-tip { background: var(--accent-soft); border-radius: 12px; padding: 12px 14px; font-size: .85rem; line-height: 1.55; margin-top: 10px; }
</style>
</head>
<body>
<header>
  <img src="icon.svg" alt="">
  <h1>CapiMenú</h1>
  <div class="week-label" id="week-label"></div>
</header>
<main id="view"></main>
<nav id="nav">
  <button data-tab="hoy"><span class="ico">🦫</span>Hoy</button>
  <button data-tab="semana"><span class="ico">📅</span>Semana</button>
  <button data-tab="super"><span class="ico">🛒</span>Compras</button>
  <button data-tab="antojos"><span class="ico">🍊</span>Antojos</button>
</nav>
<div id="modal"><div class="sheet" id="sheet"></div></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
